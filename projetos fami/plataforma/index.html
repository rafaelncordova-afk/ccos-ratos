<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plataforma Fami &mdash; Clientes</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0f1117; --bg2: #161923; --bg3: #1c2030; --bg4: #232738;
  --border: #2a2e40; --text: #e2e8f0; --text2: #8892a4; --text3: #535a6e;
  --accent: #6366f1; --accent2: #818cf8;
  --green: #22c55e; --red: #ef4444; --yellow: #f59e0b;
  --sidebar-w: 288px;
}

body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; font-size: 13px; line-height: 1.5; height: 100vh; overflow: hidden; }

/* ===== SPLASH ===== */
#splash { display: flex; align-items: center; justify-content: center; height: 100vh; flex-direction: column; gap: 20px; }
.splash-logo { font-size: 44px; }
.splash-title { font-size: 22px; font-weight: 700; letter-spacing: -.3px; }
.splash-sub { color: var(--text2); font-size: 13px; text-align: center; max-width: 360px; line-height: 1.6; }
.btn-connect { background: var(--accent); color: #fff; border: none; padding: 12px 28px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: background .15s; margin-top: 4px; }
.btn-connect:hover { background: var(--accent2); }
.splash-hint { color: var(--text3); font-size: 11px; }

/* ===== APP ===== */
#app { display: none; height: 100vh; }
.layout { display: flex; height: 100vh; overflow: hidden; }

/* ===== SIDEBAR ===== */
.sidebar { width: var(--sidebar-w); min-width: var(--sidebar-w); background: var(--bg2); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
.sidebar-top { padding: 14px 14px 10px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.sidebar-brand { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
.sidebar-brand-name { font-size: 13px; font-weight: 700; }
.client-count { font-size: 10px; color: var(--text3); margin-left: auto; }
.search-wrap { position: relative; margin-bottom: 8px; }
.search-input { width: 100%; background: var(--bg3); border: 1px solid var(--border); color: var(--text); padding: 7px 10px 7px 30px; border-radius: 6px; font-size: 12px; outline: none; transition: border-color .15s; }
.search-input:focus { border-color: var(--accent); }
.search-icon { position: absolute; left: 9px; top: 50%; transform: translateY(-50%); color: var(--text3); font-size: 11px; pointer-events: none; }
.sidebar-sort { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 6px; }
.sort-btn { background: transparent; border: 1px solid var(--border); color: var(--text3); font-size: 10px; padding: 3px 7px; border-radius: 4px; cursor: pointer; transition: all .15s; }
.sort-btn.active, .sort-btn:hover { background: var(--bg4); color: var(--text); border-color: var(--accent); }
.sidebar-filter-row { display: flex; gap: 4px; flex-wrap: wrap; align-items: center; padding-top: 6px; border-top: 1px solid var(--border); }
.filter-row-label { font-size: 10px; color: var(--text3); white-space: nowrap; }
.filter-btn { background: transparent; border: 1px solid var(--border); color: var(--text3); font-size: 10px; padding: 3px 7px; border-radius: 4px; cursor: pointer; transition: all .15s; }
.filter-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.filter-btn:not(.active):hover { background: var(--bg4); color: var(--text2); }
.client-list { flex: 1; overflow-y: auto; }
.client-list::-webkit-scrollbar { width: 4px; }
.client-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

.client-item { padding: 9px 14px; cursor: pointer; border-bottom: 1px solid var(--border); transition: background .1s; user-select: none; }
.client-item:hover { background: var(--bg3); }
.client-item.selected { background: var(--bg4); border-left: 3px solid var(--accent); padding-left: 11px; }
.ci-name { font-size: 12px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.ci-code { font-size: 10px; color: var(--text3); margin-bottom: 3px; }
.ci-bottom { display: flex; justify-content: space-between; align-items: center; gap: 4px; }
.ci-pat { font-size: 11px; color: var(--text2); font-weight: 500; flex-shrink: 0; }
.ci-rent { font-size: 10px; flex-shrink: 0; }
.ci-dots { display: flex; gap: 3px; align-items: center; }
.ci-dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; }

.positive { color: var(--green); }
.negative { color: var(--red); }
.neutral { color: var(--text2); }

/* ===== PANEL ===== */
.panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
#no-selection { flex: 1; display: flex; align-items: center; justify-content: center; color: var(--text3); font-size: 14px; flex-direction: column; gap: 12px; }
#no-selection .ns-icon { font-size: 40px; }
#client-view { flex: 1; display: none; flex-direction: column; overflow: hidden; }

/* ===== CLIENT HEADER ===== */
.client-header { padding: 12px 22px 10px; border-bottom: 1px solid var(--border); background: var(--bg2); flex-shrink: 0; }
.ch-top { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
.ch-avatar { width: 36px; height: 36px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; color: #fff; flex-shrink: 0; }
.ch-info { flex: 1; min-width: 0; }
.ch-nome { font-size: 15px; font-weight: 700; }
.ch-codigo { font-size: 11px; color: var(--text3); }
.ch-pat { text-align: right; flex-shrink: 0; }
.ch-pat-val { font-size: 16px; font-weight: 700; }
.ch-pat-lbl { font-size: 10px; color: var(--text3); }

/* ===== FLAGS ===== */
.flags-row { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
.flags-label { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: .5px; margin-right: 4px; }
.flag-chip { display: inline-flex; align-items: center; gap: 5px; padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 500; cursor: pointer; border: 1px solid var(--border); background: var(--bg3); color: var(--text3); transition: all .15s; user-select: none; }
.flag-chip:hover { background: var(--bg4); color: var(--text2); }
.flag-chip.active { cursor: pointer; }
.flag-chip .fchk { font-size: 10px; }
/* auto-detected fee fixo: non-interactive */
.flag-chip.auto { cursor: default; }

/* ===== TABS ===== */
.tabs { display: flex; border-bottom: 1px solid var(--border); background: var(--bg2); flex-shrink: 0; padding: 0 22px; }
.tab-btn { padding: 9px 14px; font-size: 12px; font-weight: 500; color: var(--text2); background: transparent; border: none; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: color .15s, border-color .15s; }
.tab-btn:hover { color: var(--text); }
.tab-btn.active { color: var(--accent2); border-bottom-color: var(--accent); }

.tab-body { flex: 1; overflow-y: auto; padding: 18px 22px 32px; }
.tab-body::-webkit-scrollbar { width: 4px; }
.tab-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

/* ===== RESUMO ===== */
.perf-row { display: flex; gap: 10px; margin-bottom: 18px; flex-wrap: wrap; }
.perf-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; min-width: 120px; flex: 1; }
.pc-label { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 5px; }
.pc-val { font-size: 20px; font-weight: 700; margin-bottom: 2px; }
.pc-cdi { font-size: 11px; }
.pc-ganho { font-size: 11px; color: var(--text2); margin-top: 4px; border-top: 1px solid var(--border); padding-top: 4px; }

.resumo-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
@media (max-width: 860px) { .resumo-grid { grid-template-columns: 1fr; } }

/* ===== SEC-BOX ===== */
.sec-box { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; margin-bottom: 14px; }
.sec-box.editing { border-color: var(--accent); }
.sec-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.sec-header h3 { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: .5px; }
.btn-sec-edit { background: transparent; border: 1px solid var(--border); color: var(--text3); font-size: 10px; padding: 3px 9px; border-radius: 4px; cursor: pointer; transition: all .15s; }
.btn-sec-edit:hover, .sec-box.editing .btn-sec-edit { background: var(--bg4); color: var(--text); border-color: var(--accent); }
.btn-sec-save { background: var(--accent); border: none; color: #fff; font-size: 10px; padding: 3px 10px; border-radius: 4px; cursor: pointer; margin-left: 4px; }
.btn-sec-cancel { background: transparent; border: 1px solid var(--border); color: var(--text3); font-size: 10px; padding: 3px 9px; border-radius: 4px; cursor: pointer; margin-left: 3px; }

.pf-row { display: flex; gap: 8px; margin-bottom: 7px; font-size: 12px; align-items: flex-start; }
.pf-key { color: var(--text3); white-space: nowrap; min-width: 90px; flex-shrink: 0; font-size: 11px; padding-top: 2px; }
.pf-val { color: var(--text); line-height: 1.4; flex: 1; min-height: 18px; word-break: break-word; }
.pf-val.editable { border-radius: 4px; padding: 1px 5px; margin: -1px -5px; transition: background .15s; }
.sec-box.editing .pf-val.editable { background: var(--bg3); }
.sec-box:not(.editing) .pf-val.editable:hover { background: var(--bg4); cursor: text; }
.sec-box:not(.editing) .pf-val.editable:empty::after { content: '— (vazio)'; color: var(--text3); font-style: italic; }

.pf-edit-input { width: 100%; background: transparent; border: none; border-bottom: 1px solid var(--accent); color: var(--text); padding: 1px 2px; font-size: 12px; font-family: inherit; outline: none; line-height: 1.4; }

.anotacoes-wrap { margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); }
.anotacoes-label { font-size: 10px; color: var(--text3); margin-bottom: 5px; }
.anotacoes-text { font-size: 12px; color: var(--text2); white-space: pre-wrap; word-break: break-word; min-height: 20px; cursor: text; border-radius: 4px; padding: 4px; }
.anotacoes-text:hover { background: var(--bg4); }
.anotacoes-text:empty::before { content: 'Nenhuma anotação. Clique para adicionar...'; color: var(--text3); font-style: italic; }
.anotacoes-textarea { width: 100%; background: var(--bg3); border: 1px solid var(--accent); color: var(--text); padding: 7px 9px; border-radius: 6px; font-size: 12px; font-family: inherit; resize: vertical; min-height: 70px; outline: none; line-height: 1.5; }
.anotacoes-save-row { display: flex; gap: 6px; margin-top: 5px; justify-content: flex-end; }
.btn-anotacoes-save { background: var(--accent); border: none; color: #fff; font-size: 11px; padding: 4px 12px; border-radius: 4px; cursor: pointer; }
.btn-anotacoes-cancel { background: transparent; border: 1px solid var(--border); color: var(--text3); font-size: 11px; padding: 4px 10px; border-radius: 4px; cursor: pointer; }

/* ===== CARTEIRA ===== */
.carteira-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.btn-upload { background: var(--bg3); border: 1px solid var(--border); color: var(--text2); padding: 7px 14px; border-radius: 6px; font-size: 12px; cursor: pointer; transition: all .15s; }
.btn-upload:hover { background: var(--bg4); color: var(--text); border-color: var(--accent); }
.relatorio-nome { font-size: 10px; color: var(--text3); }
.perf-table { width: 100%; border-collapse: collapse; margin-bottom: 18px; }
.perf-table th { background: var(--bg3); color: var(--text3); font-size: 10px; text-transform: uppercase; letter-spacing: .5px; padding: 8px 12px; text-align: left; border-bottom: 1px solid var(--border); }
.perf-table td { padding: 9px 12px; border-bottom: 1px solid var(--border); font-size: 12px; }
.perf-table tr:last-child td { border-bottom: none; }
.perf-table tr:hover td { background: var(--bg2); }
.nr { text-align: right; font-variant-numeric: tabular-nums; }
.chart-wrap { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 14px; margin-bottom: 14px; position: relative; height: 230px; }
.ganho-real-wrap { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; }
.ganho-real-wrap h4 { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 8px; }
.ganho-pills { display: flex; gap: 8px; flex-wrap: wrap; }
.gpill { background: var(--bg3); border: 1px solid var(--border); border-radius: 6px; padding: 5px 12px; font-size: 12px; }

/* ===== MENSAGENS ===== */
.msgs-count-line { font-size: 11px; color: var(--text3); margin-bottom: 10px; }
.msgs-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
.msg-item { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
.msg-header { padding: 9px 14px; background: var(--bg3); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; cursor: pointer; user-select: none; }
.msg-header-left { display: flex; align-items: center; gap: 8px; }
.msg-nome { font-size: 12px; font-weight: 600; }
.msg-status-tag { font-size: 10px; color: var(--text3); }
.msg-toggle { font-size: 11px; color: var(--text3); }
.msg-body { padding: 12px 14px; font-size: 12px; color: var(--text2); line-height: 1.7; white-space: pre-wrap; word-break: break-word; display: none; }
.msg-body.open { display: block; }
.msg-preview { padding: 7px 14px; font-size: 11px; color: var(--text3); cursor: pointer; line-height: 1.4; }

.nova-msg { background: var(--bg2); border: 1px solid var(--accent); border-radius: 10px; overflow: hidden; }
.nova-msg-head { padding: 9px 14px; background: var(--bg3); border-bottom: 1px solid var(--border); }
.nova-msg-head h4 { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: .5px; }
.nm-top { padding: 10px 14px 6px; display: flex; gap: 8px; align-items: center; }
.nm-label { font-size: 11px; color: var(--text3); white-space: nowrap; }
.nm-input { background: var(--bg3); border: 1px solid var(--border); color: var(--text); padding: 5px 9px; border-radius: 6px; font-size: 12px; flex: 1; outline: none; font-family: inherit; }
.nm-input:focus { border-color: var(--accent); }
.nm-textarea { width: 100%; background: transparent; border: none; border-top: 1px solid var(--border); color: var(--text); padding: 12px 14px; font-size: 12px; font-family: inherit; line-height: 1.7; resize: vertical; min-height: 140px; outline: none; }
.nm-footer { padding: 9px 14px; background: var(--bg3); border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
.btn-save { background: var(--accent); color: #fff; border: none; padding: 7px 16px; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; transition: background .15s; }
.btn-save:hover { background: var(--accent2); }
.empty-state { color: var(--text3); font-size: 12px; padding: 16px 0; }

/* ===== COE CONCENTRAÇÃO ===== */
.coe-section { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; margin-top: 14px; }
.coe-section.coe-danger { border-color: #7f1d1d; }
.coe-section.coe-warn { border-color: #b45309; }
.coe-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.coe-header h3 { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: .5px; }
.coe-badge { padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }
.coe-badge.ok  { background: #0a2018; color: #34d399; border: 1px solid #065f46; }
.coe-badge.warn { background: #261f0a; color: #fbbf24; border: 1px solid #b45309; }
.coe-badge.danger { background: #2a0a0a; color: #ef4444; border: 1px solid #7f1d1d; }
.coe-input-row { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
.coe-label { font-size: 12px; color: var(--text2); }
.coe-input { background: var(--bg3); border: 1px solid var(--border); color: var(--text); padding: 5px 9px; border-radius: 6px; font-size: 13px; font-weight: 600; width: 80px; outline: none; text-align: center; }
.coe-input:focus { border-color: var(--accent); }
.btn-coe-save { background: var(--bg4); border: 1px solid var(--border); color: var(--text2); padding: 5px 12px; border-radius: 6px; font-size: 11px; cursor: pointer; transition: all .15s; }
.btn-coe-save:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
.coe-bar-track { background: var(--bg4); border-radius: 6px; height: 10px; overflow: hidden; margin-bottom: 8px; position: relative; }
.coe-bar-fill { height: 100%; border-radius: 6px; transition: width .4s, background .3s; }
.coe-bar-limit { position: absolute; top: 0; bottom: 0; width: 2px; background: rgba(255,255,255,.3); }
.coe-bar-labels { display: flex; justify-content: space-between; font-size: 10px; color: var(--text3); }
.coe-rules { margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); font-size: 11px; color: var(--text3); display: flex; gap: 16px; flex-wrap: wrap; }

/* ===== ASSET SEARCH SIDEBAR ===== */
.asset-search-wrap { padding-top: 8px; margin-top: 4px; border-top: 1px solid var(--border); }
.asset-search-label { font-size: 10px; color: var(--text3); margin-bottom: 4px; display: flex; justify-content: space-between; align-items: center; }
.asset-clear-btn { font-size: 10px; color: var(--accent2); cursor: pointer; background: none; border: none; padding: 0; }
.asset-search-input { width: 100%; background: var(--bg3); border: 1px solid var(--border); color: var(--text); padding: 6px 10px; border-radius: 6px; font-size: 12px; outline: none; transition: border-color .15s; }
.asset-search-input:focus { border-color: var(--accent); }
#asset-results { flex: 1; overflow-y: auto; }
#asset-results::-webkit-scrollbar { width: 4px; }
#asset-results::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
.asi-header { font-size: 11px; color: var(--text3); padding: 10px 14px 6px; }
.asi-client { padding: 9px 14px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background .1s; }
.asi-client:hover { background: var(--bg3); }
.asi-nome { font-size: 12px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
.asi-match { font-size: 11px; color: var(--text2); padding: 2px 0; }
.asi-match strong { color: var(--accent2); }

/* ===== ATIVOS TAB ===== */
.ativos-toolbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.ativos-status { font-size: 12px; color: var(--text2); }
.ativos-category { margin-bottom: 18px; }
.ativos-cat-header { display: flex; justify-content: space-between; align-items: center; padding: 8px 12px; background: var(--bg3); border-radius: 8px 8px 0 0; border: 1px solid var(--border); font-size: 11px; font-weight: 600; color: var(--text2); cursor: pointer; user-select: none; }
.ativos-cat-header:hover { background: var(--bg4); }
.ativos-table { width: 100%; border-collapse: collapse; border: 1px solid var(--border); border-top: none; border-radius: 0 0 8px 8px; overflow: hidden; }
.ativos-table th { background: var(--bg2); color: var(--text3); font-size: 10px; text-transform: uppercase; letter-spacing: .4px; padding: 7px 12px; text-align: left; border-bottom: 1px solid var(--border); }
.ativos-table td { padding: 8px 12px; border-bottom: 1px solid var(--border); font-size: 12px; }
.ativos-table tr:last-child td { border-bottom: none; }
.ativos-table tr:hover td { background: var(--bg3); }
.ativo-nome { color: var(--text); max-width: 340px; word-break: break-word; line-height: 1.4; }

/* ===== MISC ===== */
.loading-overlay { position: fixed; inset: 0; background: rgba(15,17,23,.88); display: flex; align-items: center; justify-content: center; z-index: 1000; flex-direction: column; gap: 14px; }
.loading-spin { width: 30px; height: 30px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; }
.loading-text { color: var(--text2); font-size: 13px; }
@keyframes spin { to { transform: rotate(360deg); } }
#toast { position: fixed; bottom: 22px; right: 22px; background: var(--bg4); color: var(--text); border: 1px solid var(--border); border-radius: 8px; padding: 9px 14px; font-size: 12px; z-index: 2000; opacity: 0; transform: translateY(6px); transition: all .2s; pointer-events: none; max-width: 280px; }
#toast.show { opacity: 1; transform: translateY(0); }
#toast.tok { border-color: var(--green); }
#toast.terr { border-color: var(--red); }
</style>
</head>
<body>

<div id="splash">
  <div class="splash-logo">&#x1F4CA;</div>
  <div class="splash-title">Plataforma Fami</div>
  <div class="splash-sub">Conecte a pasta <strong>clientes/</strong> para carregar sua carteira com performance, mensagens e perfis.</div>
  <button class="btn-connect" onclick="openFolder()">&#x1F4C2; Conectar pasta clientes</button>
  <div class="splash-hint">Chrome ou Edge &mdash; requer permiss&atilde;o de leitura e escrita</div>
</div>

<div class="loading-overlay" id="loading" style="display:none">
  <div class="loading-spin"></div>
  <div class="loading-text" id="loading-text">Carregando...</div>
</div>

<div id="app">
  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-top">
        <div class="sidebar-brand">
          <span>&#x1F4CA;</span>
          <span class="sidebar-brand-name">FAMI Clientes</span>
          <span class="client-count" id="client-count">—</span>
        </div>
        <div class="search-wrap">
          <span class="search-icon">&#x1F50D;</span>
          <input class="search-input" id="search-input" placeholder="Buscar nome ou c&oacute;digo..." oninput="searchClients(this.value)">
        </div>
        <div class="sidebar-sort">
          <button class="sort-btn active" onclick="sortBy('patrimonio',this)">Patrim&ocirc;nio</button>
          <button class="sort-btn" onclick="sortBy('rent_mes',this)">Rent. Bruta</button>
          <button class="sort-btn" onclick="sortBy('pct_cdi_mes',this)">% CDI</button>
          <button class="sort-btn" onclick="sortBy('nome',this)">Nome A&ndash;Z</button>
        </div>
        <div class="sidebar-filter-row">
          <span class="filter-row-label">Filtrar:</span>
          <button class="filter-btn" id="fb-fee_fixo" onclick="toggleFilter('fee_fixo',this)">Fee Fixo</button>
          <button class="filter-btn" id="fb-ff_excl_rv" onclick="toggleFilter('ff_excl_rv',this)">c/ Excl. RV</button>
          <button class="filter-btn" id="fb-liquidez" onclick="toggleFilter('liquidez',this)">Liquidez</button>
          <button class="filter-btn" id="fb-credito_pf" onclick="toggleFilter('credito_pf',this)">Cr&eacute;dito PF</button>
          <button class="filter-btn" id="fb-alerta_coe" onclick="toggleFilter('alerta_coe',this)">&#x26A0; COE &gt;20%</button>
        <div class="asset-search-wrap">
          <div class="asset-search-label">
            <span>&#x1F4C8; Buscar por ativo</span>
            <button class="asset-clear-btn" onclick="exitAssetSearch()" id="asset-clear-btn" style="display:none">&#x2715; Limpar</button>
          </div>
          <input class="asset-search-input" id="asset-query" placeholder="Ex: KNJT11, BTG, Tesouro..." oninput="searchByAsset(this.value)">
        </div>
        </div>
      </div>
      <div class="client-list" id="client-list"></div>
      <div id="asset-results" style="display:none;flex:1;overflow-y:auto"></div>
    </aside>

    <main class="panel">
      <div id="no-selection">
        <div class="ns-icon">&#x1F4CC;</div>
        Selecione um cliente na lista
      </div>
      <div id="client-view">
        <div class="client-header">
          <div class="ch-top">
            <div class="ch-avatar" id="ch-avatar">?</div>
            <div class="ch-info">
              <div class="ch-nome" id="ch-nome">—</div>
              <div class="ch-codigo" id="ch-codigo">—</div>
            </div>
            <div class="ch-pat">
              <div class="ch-pat-val" id="ch-pat-val">—</div>
              <div class="ch-pat-lbl">Patrim&ocirc;nio (mai/2026)</div>
            </div>
          </div>
          <div class="flags-row" id="ch-flags">
            <span class="flags-label">Marcadores</span>
          </div>
        </div>
        <nav class="tabs">
          <button class="tab-btn active" data-tab="resumo" onclick="showTab('resumo')">Resumo</button>
          <button class="tab-btn" data-tab="carteira" onclick="showTab('carteira')">Carteira</button>
          <button class="tab-btn" data-tab="mensagens" onclick="showTab('mensagens')">Mensagens <span id="msg-count" style="font-size:10px;color:var(--text3)"></span></button>
          <button class="tab-btn" data-tab="ativos" onclick="showTab('ativos')">Ativos</button>
          <button class="tab-btn" data-tab="reunioes" onclick="showTab('reunioes')">Reuni&otilde;es</button>
        </nav>
        <div class="tab-body">
          <div id="tab-resumo"></div>
          <div id="tab-carteira" style="display:none"></div>
          <div id="tab-mensagens" style="display:none"></div>
          <div id="tab-ativos" style="display:none"></div>
          <div id="tab-reunioes" style="display:none"></div>
        </div>
      </div>
    </main>
  </div>
</div>

<div id="toast"></div>

<script>
// ================================================================
// CONSTANTS
// ================================================================
const FLAG_DEFS = [
  { key: 'fee_fixo',    label: 'Fee Fixo',         color: '#818cf8', bg: '#1e1f45', border: '#3730a3', dot: '#818cf8' },
  { key: 'ff_excl_rv',  label: 'FF c/ Excl. RV',  color: '#a78bfa', bg: '#1c1735', border: '#5b21b6', dot: '#a78bfa' },
  { key: 'liquidez',    label: 'Liquidez',          color: '#fbbf24', bg: '#261f0a', border: '#b45309', dot: '#fbbf24' },
  { key: 'credito_pf',  label: 'Crédito PF',       color: '#34d399', bg: '#0a2018', border: '#065f46', dot: '#34d399' },
];

// Clientes com Fee Fixo em mai/2026 (do relatório de comissões)
const FEE_FIXO_CODES = new Set([
  '3424140','8227409','2143369','2861533','2498565','2112212','2010572',
  '4547934','3355473','2978828','3242303','3950461','4571340','18295452',
  '18382970','5892942','19119719','5993019','18382020'
]);

// ================================================================
// STATE
// ================================================================
let allClients = [], filteredClients = [], selectedClient = null;
let rootHandle = null, tabelaData = {}, chartInst = null, currentSort = 'patrimonio';
let activeFilters = new Set(); // flag keys being filtered

// ================================================================
// FOLDER ACCESS
// ================================================================
async function openFolder() {
  if (!window.showDirectoryPicker) { alert('Use Chrome ou Edge.'); return; }
  try {
    rootHandle = await window.showDirectoryPicker({ mode: 'readwrite' });
    await persistHandle(rootHandle);
    await loadData();
  } catch(e) { if (e.name !== 'AbortError') toast('Erro: ' + e.message, 'err'); }
}
async function persistHandle(h) {
  try {
    const db = await openDB();
    const tx = db.transaction('handles', 'readwrite');
    tx.objectStore('handles').put(h, 'root');
    await txDone(tx); db.close();
  } catch(e) {}
}
async function restoreHandle() {
  try {
    const db = await openDB();
    const tx = db.transaction('handles', 'readonly');
    const req = tx.objectStore('handles').get('root');
    const h = await new Promise((res, rej) => { req.onsuccess = () => res(req.result); req.onerror = rej; });
    db.close();
    if (!h) return null;
    const perm = await h.queryPermission({ mode: 'readwrite' });
    if (perm === 'granted') return h;
    return (await h.requestPermission({ mode: 'readwrite' })) === 'granted' ? h : null;
  } catch(e) { return null; }
}
function openDB() {
  return new Promise((res, rej) => {
    const req = indexedDB.open('fami-plataforma', 1);
    req.onupgradeneeded = () => { if (!req.result.objectStoreNames.contains('handles')) req.result.createObjectStore('handles'); };
    req.onsuccess = () => res(req.result); req.onerror = rej;
  });
}
function txDone(tx) { return new Promise((res, rej) => { tx.oncomplete = res; tx.onerror = rej; }); }

// ================================================================
// DATA LOADING
// ================================================================
async function loadData() {
  showLoading('Lendo tabela de clientes...');
  try {
    const fh = await rootHandle.getFileHandle('tabela_clientes.md');
    tabelaData = parseTabela(await (await fh.getFile()).text());
  } catch(e) { console.warn('tabela_clientes.md:', e); }

  showLoading('Lendo pastas de clientes...');
  allClients = [];
  let count = 0;

  for await (const [name, handle] of rootHandle.entries()) {
    if (handle.kind !== 'directory') continue;
    if (name.startsWith('_') || name.startsWith('.')) continue;
    const match = name.match(/^(.+?)\s*-\s*(\d+)(\s*.*)?$/);
    if (!match) continue;

    const nome = match[1].trim(), codigo = match[2].trim();
    count++;
    if (count % 10 === 0) showLoading('Lendo clientes... (' + count + ')');

    let perfil = {}, perfilRaw = '';
    try {
      const pfh = await handle.getFileHandle('perfil.md');
      perfilRaw = await (await pfh.getFile()).text();
      perfil = parsePerfil(perfilRaw);
    } catch(e) {}

    // Auto-detect fee_fixo from known list (add to flags if not already there)
    if (FEE_FIXO_CODES.has(codigo)) {
      const flags = new Set((perfil.flags || '').split(',').map(s => s.trim()).filter(Boolean));
      if (!flags.has('fee_fixo')) { flags.add('fee_fixo'); perfil.flags = [...flags].join(','); }
    }

    const mensagens = [];
    try {
      for await (const [fname, fh] of handle.entries()) {
        if (fh.kind !== 'file' || fname === 'perfil.md' || !fname.toLowerCase().endsWith('.md')) continue;
        try { mensagens.push({ nome: fname, conteudo: await (await fh.getFile()).text(), handle: fh }); } catch(e) {}
      }
    } catch(e) {}
    try {
      const msgDir = await handle.getDirectoryHandle('mensagens');
      for await (const [fname, fh] of msgDir.entries()) {
        if (fh.kind !== 'file' || !fname.toLowerCase().endsWith('.md')) continue;
        try { mensagens.push({ nome: fname, conteudo: await (await fh.getFile()).text(), handle: fh, sub: 'mensagens' }); } catch(e) {}
      }
    } catch(e) {}
    mensagens.sort((a, b) => b.nome.localeCompare(a.nome));

    const relatorios = [];
    try {
      const relDir = await handle.getDirectoryHandle('relatorios');
      for await (const [fname, fh] of relDir.entries()) {
        if (fh.kind === 'file' && fname.toLowerCase().endsWith('.pdf')) relatorios.push({ nome: fname, handle: fh });
      }
      relatorios.sort((a, b) => b.nome.localeCompare(a.nome));
    } catch(e) {}

    allClients.push({ pasta: name, nome, codigo, handle, perfil, perfilRaw, mensagens, relatorios, perf: tabelaData[codigo] || null });
  }

  filteredClients = [...allClients];
  sortAndRender();
  hideLoading();
  document.getElementById('splash').style.display = 'none';
  document.getElementById('app').style.display = 'block';
}

// ================================================================
// PARSERS
// ================================================================
function parseTabela(text) {
  const out = {};
  const lines = text.split('\n');
  let hdr = lines.findIndex(l => l.includes('Cliente') && l.includes('digo'));
  if (hdr < 0) return out;
  for (let i = hdr + 2; i < lines.length; i++) {
    const cols = lines[i].split('|').map(c => c.trim()).filter(Boolean);
    if (cols.length < 3) continue;
    const codigo = cols[1];
    if (!/^\d+$/.test(codigo)) continue;
    out[codigo] = {
      nome: cols[0], codigo,
      patrimonio: parseMoney(cols[2]), ganho_mes: parseMoney(cols[3]),
      rent_mes: parsePct(cols[4]), pct_cdi_mes: parsePct(cols[5]),
      rent_ano: parsePct(cols[6]), pct_cdi_ano: parsePct(cols[7]),
      rent_12m: parsePct(cols[8]), pct_cdi_12m: parsePct(cols[9]),
      rent_24m: parsePct(cols[10]), pct_cdi_24m: parsePct(cols[11]),
      ipca_ano: parsePct(cols[12]), ipca_12m: parsePct(cols[13]), ipca_24m: parsePct(cols[14]),
      ganho_real_ano: parsePct(cols[15]), ganho_real_12m: parsePct(cols[16]), ganho_real_24m: parsePct(cols[17]),
    };
  }
  return out;
}

function parsePerfil(text) {
  const obj = {};
  let section = '';
  for (const line of text.split('\n')) {
    const t = line.trim();
    if (t.startsWith('# ')) obj._titulo = t.slice(2);
    else if (t.startsWith('## ')) section = t.slice(3);
    else if (t.startsWith('- ')) {
      const ci = t.indexOf(':');
      if (ci > 1) { obj[t.slice(2, ci).trim()] = t.slice(ci + 1).trim(); }
    }
  }
  return obj;
}

function parseMoney(s) {
  if (!s || s === 'N/D') return null;
  const n = parseFloat(s.replace(/R\$\s*/g, '').replace(/\./g, '').replace(',', '.').trim());
  return isNaN(n) ? null : n;
}
function parsePct(s) {
  if (!s || s === 'N/D') return null;
  const n = parseFloat(s.replace('%', '').replace(',', '.'));
  return isNaN(n) ? null : n;
}

// ================================================================
// FORMATTING
// ================================================================
function fmMoney(v, compact) {
  if (v == null) return '—';
  if (compact) {
    if (Math.abs(v) >= 1e6) return 'R$ ' + (v/1e6).toFixed(2).replace('.', ',') + 'M';
    if (Math.abs(v) >= 1e3) return 'R$ ' + (v/1e3).toFixed(0) + 'K';
    return 'R$ ' + v.toFixed(0);
  }
  return 'R$ ' + v.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}
function fmPct(v) {
  if (v == null) return '—';
  const s = v.toFixed(2).replace('.', ',') + '%';
  return v > 0 ? '+' + s : s;
}
function fmPctPlain(v) { return v == null ? '—' : v.toFixed(2).replace('.', ',') + '%'; }
function fmCDI(v) { return v == null ? '—' : v.toFixed(0) + '% CDI'; }
function pclass(v) { return v == null ? '' : v > 0 ? 'positive' : v < 0 ? 'negative' : 'neutral'; }
function initials(n) { return n.split(' ').map(w => w[0]).slice(0, 2).join('').toUpperCase(); }
function esc(s) {
  return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

// ================================================================
// FLAGS
// ================================================================
function getFlags(c) {
  return new Set((c.perfil.flags || '').split(',').map(s => s.trim()).filter(Boolean));
}

function renderFlagChips() {
  const c = selectedClient;
  if (!c) return;
  const flags = getFlags(c);
  const el = document.getElementById('ch-flags');
  if (!el) return;

  el.innerHTML = '<span class="flags-label">Marcadores</span>' +
    FLAG_DEFS.map(f => {
      const active = flags.has(f.key);
      const style = active
        ? `background:${f.bg};color:${f.color};border-color:${f.border}`
        : '';
      return `<span class="flag-chip${active ? ' active' : ''}" style="${style}" onclick="toggleFlag('${f.key}')">
        <span class="fchk">${active ? '&#x2713;' : '+'}</span> ${f.label}
      </span>`;
    }).join('');
}

async function toggleFlag(key) {
  const c = selectedClient;
  const flags = getFlags(c);
  if (flags.has(key)) flags.delete(key);
  else flags.add(key);

  const newVal = [...flags].join(',');
  const oldVal = c.perfil.flags || '';
  c.perfil.flags = newVal;
  await writePerfilField(c, 'flags', oldVal, newVal);
  renderFlagChips();
  renderSidebar();
}

// ================================================================
// SORTING + SIDEBAR
// ================================================================
function sortBy(key, btn) {
  currentSort = key;
  document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  applyFiltersAndSort();
}

function sortAndRender() { applyFiltersAndSort(); }

function searchClients(q) { applyFiltersAndSort(); }

function toggleFilter(key, btn) {
  if (activeFilters.has(key)) { activeFilters.delete(key); btn.classList.remove('active'); }
  else { activeFilters.add(key); btn.classList.add('active'); }
  applyFiltersAndSort();
}

function applyFiltersAndSort() {
  const q = (document.getElementById('search-input')?.value || '').toLowerCase().trim();

  filteredClients = allClients.filter(c => {
    // busca textual
    if (q && !c.nome.toLowerCase().includes(q) && !c.codigo.includes(q)) return false;
    // filtros de flag: OR — mostra se tiver qualquer um dos filtros ativos
    if (activeFilters.size > 0) {
      const flags = getFlags(c);
      const coePct = parseFloat(c.perfil.coe_pct || 0) || (c.coePctEstimado || 0);
      const matches = [...activeFilters].some(f =>
        f === 'alerta_coe' ? coePct > 20 : flags.has(f)
      );
      if (!matches) return false;
    }
    return true;
  });

  filteredClients.sort((a, b) => {
    if (currentSort === 'nome') return a.nome.localeCompare(b.nome, 'pt-BR');
    const va = a.perf?.[currentSort] ?? -Infinity, vb = b.perf?.[currentSort] ?? -Infinity;
    return vb - va;
  });

  renderSidebar();
}

function renderSidebar() {
  const list = document.getElementById('client-list');
  list.innerHTML = '';
  document.getElementById('client-count').textContent = filteredClients.length + ' clientes';

  filteredClients.forEach(c => {
    const p = c.perf;
    const flags = getFlags(c);
    const div = document.createElement('div');
    div.className = 'client-item' + (selectedClient?.codigo === c.codigo ? ' selected' : '');
    div.onclick = () => selectClient(c);

    const coePct = parseFloat(c.perfil.coe_pct || 0) || (c.coePctEstimado || 0);
    const coeAlerta = coePct > 20
      ? `<span class="ci-dot" style="background:#f59e0b" title="COE ${coePct.toFixed(1)}%${c.coePctEstimado && !c.perfil.coe_pct ? ' (estimado)' : ''}"></span>` : '';
    const dots = FLAG_DEFS.filter(f => flags.has(f.key))
      .map(f => `<span class="ci-dot" style="background:${f.dot}" title="${f.label}"></span>`).join('') + coeAlerta;

    div.innerHTML =
      '<div class="ci-name">' + esc(c.nome) + '</div>' +
      '<div class="ci-code">' + c.codigo + '</div>' +
      '<div class="ci-bottom">' +
        '<span class="ci-pat">' + (p ? fmMoney(p.patrimonio, true) : '—') + '</span>' +
        '<span class="ci-rent ' + pclass(p?.rent_mes) + '">' + fmPct(p?.rent_mes) + '</span>' +
        '<div class="ci-dots">' + dots + '</div>' +
      '</div>';
    list.appendChild(div);
  });
}

// ================================================================
// SELECT CLIENT
// ================================================================
function selectClient(c) {
  selectedClient = c;
  renderSidebar();
  document.getElementById('no-selection').style.display = 'none';
  const cv = document.getElementById('client-view');
  cv.style.display = 'flex'; cv.style.flexDirection = 'column';

  document.getElementById('ch-avatar').textContent = initials(c.nome);
  document.getElementById('ch-nome').textContent = c.nome;
  document.getElementById('ch-codigo').textContent = c.codigo;
  document.getElementById('ch-pat-val').textContent = c.perf ? fmMoney(c.perf.patrimonio) : '—';

  renderFlagChips();
  document.getElementById('msg-count').textContent = c.mensagens.length ? '(' + c.mensagens.length + ')' : '';
  showTab('resumo');
}

// ================================================================
// TABS
// ================================================================
function showTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  ['tab-resumo','tab-carteira','tab-mensagens','tab-ativos','tab-reunioes'].forEach(id => document.getElementById(id).style.display = 'none');
  document.querySelector('[data-tab="' + tab + '"]').classList.add('active');
  document.getElementById('tab-' + tab).style.display = 'block';
  if (tab === 'resumo') renderResumo();
  if (tab === 'carteira') renderCarteira();
  if (tab === 'mensagens') renderMensagens();
  if (tab === 'ativos') renderAtivos();
  if (tab === 'reunioes') renderReunioes();
}

// ================================================================
// RESUMO TAB
// ================================================================
function renderResumo() {
  const c = selectedClient, p = c.perf, pf = c.perfil;

  const periods = [
    { label: 'Mês (mai)', rent: p?.rent_mes, pct: p?.pct_cdi_mes, ganho: p?.ganho_mes },
    { label: 'No Ano', rent: p?.rent_ano, pct: p?.pct_cdi_ano },
    { label: '12 Meses', rent: p?.rent_12m, pct: p?.pct_cdi_12m },
    { label: '24 Meses', rent: p?.rent_24m, pct: p?.pct_cdi_24m },
  ];

  const perf_html = periods.map(per => {
    const cls = pclass(per.rent);
    const cdic = per.pct == null ? 'neutral' : per.pct >= 100 ? 'positive' : per.pct >= 80 ? 'neutral' : 'negative';
    return '<div class="perf-card"><div class="pc-label">' + per.label + '</div>' +
      '<div class="pc-val ' + cls + '">' + fmPct(per.rent) + '</div>' +
      '<div class="pc-cdi ' + cdic + '">' + fmCDI(per.pct) + '</div>' +
      (per.ganho != null ? '<div class="pc-ganho">Ganho: ' + fmMoney(per.ganho) + '</div>' : '') + '</div>';
  }).join('');

  document.getElementById('tab-resumo').innerHTML =
    '<div class="perf-row">' + perf_html + '</div>' +
    '<div class="resumo-grid">' +
      '<div>' +
        buildSecBox('investidor', 'Perfil do Investidor', [
          { key: 'canal_preferido', label: 'Canal' },
          { key: 'tom_preferido', label: 'Tom' },
          { key: 'perfil_risco', label: 'Risco' },
          { key: 'objetivo_principal', label: 'Objetivo' },
          { key: 'horizonte', label: 'Horizonte' },
          { key: 'tolerancia_volatilidade', label: 'Tolerância' },
        ], 'anotacoes_investidor') +
        buildSecBox('familia', 'Família &amp; Relacionamento', [
          { key: 'estado_civil', label: 'Estado civil' },
          { key: 'mae', label: 'Mãe' },
          { key: 'pai', label: 'Pai' },
          { key: 'irma', label: 'Irmã' },
          { key: 'irmao', label: 'Irmão' },
          { key: 'conjuge', label: 'Cônjuge' },
          { key: 'observacao', label: 'Obs.' },
        ], 'anotacoes_familia') +
      '</div>' +
      '<div>' +
        buildSecBox('patrimonio', 'Patrimônio Consolidado', [
          { key: 'xp', label: 'XP' },
          { key: 'banco', label: 'Banco' },
          { key: 'previdencia_bb', label: 'Previdência' },
          { key: 'exterior', label: 'Exterior' },
          { key: 'imoveis', label: 'Imóveis' },
        ], 'anotacoes_patrimonio') +
        buildSecBox('comunicacao', 'Notas de Comunicação', [
          { key: 'destacar', label: 'Destacar' },
          { key: 'evitar', label: 'Evitar' },
          { key: 'oportunidades_futuras', label: 'Oportunidades' },
        ], 'anotacoes_comunicacao') +
        (buildGanhoRealBox(p)) +
      '</div>' +
    '</div>';
}

function buildSecBox(secId, title, fields, notesKey) {
  const pf = selectedClient.perfil;
  const rows = fields.map(f =>
    '<div class="pf-row">' +
      '<span class="pf-key">' + f.label + '</span>' +
      '<span class="pf-val editable" id="pfval-' + secId + '-' + f.key + '" data-key="' + f.key + '">' + esc(pf[f.key] || '') + '</span>' +
    '</div>'
  ).join('');

  const notesVal = notesKey ? (pf[notesKey] || '') : '';
  const notesHtml = notesKey
    ? '<div class="anotacoes-wrap">' +
        '<div class="anotacoes-label">&#x1F4DD; Anotações</div>' +
        '<div class="anotacoes-text" id="anot-view-' + notesKey + '" onclick="openAnotacoes(\'' + notesKey + '\')">' + esc(notesVal) + '</div>' +
        '<div id="anot-edit-' + notesKey + '" style="display:none">' +
          '<textarea class="anotacoes-textarea" id="anot-ta-' + notesKey + '">' + esc(notesVal) + '</textarea>' +
          '<div class="anotacoes-save-row">' +
            '<button class="btn-anotacoes-cancel" onclick="closeAnotacoes(\'' + notesKey + '\',false)">Cancelar</button>' +
            '<button class="btn-anotacoes-save" onclick="closeAnotacoes(\'' + notesKey + '\',true)">Salvar</button>' +

function editSection(secId, btn) {
  const box = document.getElementById('sec-' + secId);
  const editing = box.classList.toggle('editing');
  btn.innerHTML = editing ? '&#x2713; Salvar' : '&#x270F; Editar';

  const vals = box.querySelectorAll('.pf-val.editable');
  if (editing) {
    vals.forEach(el => {
      const key = el.dataset.key;
      const cur = el.textContent.trim();
      el.innerHTML = '<input class="pf-edit-input" data-original="' + esc(cur) + '" value="' + esc(cur) + '">';
    });
    btn.onclick = () => saveSectionEdit(secId, btn);
  } else {
    vals.forEach(el => {
      const input = el.querySelector('input');
      if (input) el.textContent = input.value;
    });
  }
}

async function saveSectionEdit(secId, btn) {
  const box = document.getElementById('sec-' + secId);
  const c = selectedClient;
  const vals = box.querySelectorAll('.pf-val.editable');
  const changes = [];

  vals.forEach(el => {
    const input = el.querySelector('input');
    if (!input) return;
    const key = el.dataset.key;
    const newVal = input.value.trim();
    const oldVal = input.dataset.original;
    if (newVal !== oldVal) changes.push({ key, oldVal, newVal });
    el.textContent = newVal;
    c.perfil[key] = newVal;
  });

  box.classList.remove('editing');
  btn.innerHTML = '&#x270F; Editar';
  btn.onclick = () => editSection(secId, btn);

  if (changes.length) {
    let raw = c.perfilRaw || '';
    for (const { key, oldVal, newVal } of changes) {
      const re = new RegExp('(^- ' + key.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ':\\s*).*$', 'm');
      if (re.test(raw)) raw = raw.replace(re, '$1' + newVal);
      else raw = raw.trimEnd() + '\n- ' + key + ': ' + newVal + '\n';
    }
    await writeRaw(c, raw);
    toast(changes.length + ' campo(s) salvos', 'ok');
  }
}

      if (re.test(raw)) raw = raw.replace(re, '$1' + newVal);

async function extractCOEfromPDF(file) {
  await ensurePDFjs();
  const pdf = await window.pdfjsLib.getDocument({ data: await file.arrayBuffer() }).promise;
  const c = selectedClient;
  const patrimonio = c.perf?.patrimonio;

  let totalCOE = 0;
  let foundCOE = false;

  for (let p = 1; p <= Math.min(pdf.numPages, 15); p++) {
    const page = await pdf.getPage(p);
    const content = await page.getTextContent();
    const items = content.items.map(i => i.str.trim()).filter(Boolean);
    const text = items.join(' ');

    // 1. Explicit "COE X,XX%" in composition table
    const coePctMatch = text.match(/\bCOE\b[\s:]+(\d{1,2}[,.]\d{1,2})\s*%/i);
    if (coePctMatch) return parseFloat(coePctMatch[1].replace(',', '.'));

    // 2. "Renda Variável Global X,XX%" in XPerformance composition — proxy for COE
    // Only use this if it looks like a composition summary (not the detail table)
    const rvgMatch = text.match(/Renda\s+Vari[aá]vel\s+Global\s+R?\$?\s*[\d.]+,\d+\s+[-–]\s+(\d{1,2}[,.]\d{2})\s*%/i);
    if (rvgMatch) return parseFloat(rvgMatch[1].replace(',', '.'));

    // 3. Scan for "R$ X.XXX,XX" after COE token
    for (let i = 0; i < items.length; i++) {
      if (/^COE\b/i.test(items[i])) {
        for (let j = i + 1; j < Math.min(i + 6, items.length); j++) {
          const val = parseBRMoney(items[j]);
          if (val !== null && val > 1000) { totalCOE += val; foundCOE = true; break; }
        }
      }
    }
  }

  // 4. Fall back: use assets already parsed for this client (Renda Variável Global = COE proxy)
  if (!foundCOE && c.ativos && c.ativos.length) {
    const rvgPct = c.ativos
      .filter(a => /renda\s*vari/i.test(a.categoria))
      .reduce((s, a) => s + (a.pct || 0), 0);
    if (rvgPct > 0) return rvgPct;
  }

  if (foundCOE && patrimonio && patrimonio > 0) {
    return (totalCOE / patrimonio) * 100;
  }
  return null;
}

function parseBRMoney(s) {
  // "1.234.567,89" → 1234567.89
  const clean = s.replace(/\./g, '').replace(',', '.').replace(/[^0-9.]/g, '');
  const n = parseFloat(clean);
  return isNaN(n) ? null : n;
}

async function ensurePDFjs() {
  if (window.pdfjsLib) return;
  await new Promise((res, rej) => {
    const s = document.createElement('script');
    s.src = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
    s.onload = res; s.onerror = rej;
    document.head.appendChild(s);
  });
  window.pdfjsLib.GlobalWorkerOptions.workerSrc =
    'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
}

async function extractAssetsFromPDF(arrayBuffer) {
  await ensurePDFjs();
  const pdf = await window.pdfjsLib.getDocument({ data: arrayBuffer }).promise;

  // Collect all text items with coordinates from all pages
  const allItems = [];
  for (let p = 1; p <= pdf.numPages; p++) {
    const page = await pdf.getPage(p);
    const content = await page.getTextContent();
    for (const item of content.items) {
      const s = item.str.trim();
      if (s) allItems.push({ str: s, x: Math.round(item.transform[4]), y: Math.round(item.transform[5]), page: p });
    }
  }

  // Group items into rows by page+y
  const rowMap = new Map();
  for (const item of allItems) {
    const key = item.page + '_' + item.y;
    if (!rowMap.has(key)) rowMap.set(key, []);
    rowMap.get(key).push(item);
  }

  // Sort: page asc, y desc (top to bottom within each page)
  const rows = [...rowMap.values()]
    .sort((a, b) => a[0].page !== b[0].page ? a[0].page - b[0].page : b[0].y - a[0].y)
    .map(row => row.sort((a, b) => a.x - b.x));

  const assets = [];
  let inDetail = false;
  let currentCat = '';
  let pendingName = '';

  // Lines to skip entirely
  const SKIP_RE = /^(Estrat[eé]gia|Saldo Bruto|Qtd\.|%Aloc|Rent\.|%CDI|M[ÊE]S AT|ANO\s*$|24 M|Relat[oó]rio|MOVIMENTA|Este material|Aviso|PRECIFICA|ÍNDICE|RENTAB|EVOLU|COMPOSI|HIST[OÓ]RICO|Referências|Benchmarks|Portf[oó]lio|CDI$|Ibovespa|IPCA$|D[oó]lar$)/i;

  // Map category names from XPerformance to display labels
  function detectCategory(name) {
    if (/p[oó]s\s*fix/i.test(name)) return 'Pós Fixado';
    if (/infla/i.test(name)) return 'Inflação';
    if (/pr[eé]\s*fix/i.test(name)) return 'Pré Fixado';
    if (/renda\s*vari/i.test(name)) return 'Renda Variável Global';
    if (/fundo.*list|listados/i.test(name)) return 'Fundos Listados';
    if (/alternativo/i.test(name)) return 'Alternativo';
    if (/previd/i.test(name)) return 'Previdência';
    if (/caixa/i.test(name)) return 'Caixa';
    if (/\bcoe\b/i.test(name)) return 'COE';
    return null;
  }

  for (const row of rows) {
    const line = row.map(i => i.str).join(' ').trim();
    if (!line || line.length < 2) continue;

    // Detect the start of "POSIÇÃO DETALHADA DOS ATIVOS" table
    if (!inDetail) {
      if (/POSIÇÃO DETALHADA DOS ATIVOS|POSI.{1,5}O\s+DETALH.*ATIVO/i.test(line)) {
        inDetail = true;
      }
      continue;
    }

    // Skip section headers repeated on subsequent pages and column headers
    if (SKIP_RE.test(line) || /^([A-Z] ){3,}/.test(line) ||
        /POSIÇÃO DETALHADA|POSICAO DETALH|PRECIFICAÇÃO/i.test(line)) {
      pendingName = '';
      continue;
    }

    // ─── Find R$ monetary value in this row ───
    // XPerformance format: "R$ 56.082,57" as one item, or "R$" + "56.082,57" as two items
    let rsIdx = -1;
    let rsX = 9999;
    let monetaryValue = null;

    for (let i = 0; i < row.length; i++) {
      const s = row[i].str;
      const mA = s.match(/^R\$\s*([\d.]+,\d{2})$/);
      if (mA) { monetaryValue = parseBRMoney(mA[1]); rsIdx = i; rsX = row[i].x; break; }
      if ((s === 'R$' || s === 'R$ ') && i + 1 < row.length) {
        const mB = row[i + 1].str.match(/^([\d.]+,\d{2})$/);
        if (mB) { monetaryValue = parseBRMoney(mB[1]); rsIdx = i; rsX = row[i].x; break; }
      }
    }

    if (monetaryValue === null) {
      // No monetary value — possible multi-line asset name continuation
      if (line.length > 2 && !/^\d/.test(line) && !/^[\d,. %R$]+$/.test(line)) {
        pendingName = pendingName ? pendingName + ' ' + line : line;
      }
      continue;
    }

    // ─── Row has R$. Parse columns: name | R$ | Qtd | %Aloc | ... ───
    const isDoubleItem = row[rsIdx]?.str === 'R$' || row[rsIdx]?.str === 'R$ ';
    const afterStart = rsIdx + (isDoubleItem ? 2 : 1);
    const afterItems = row.slice(afterStart);

    // afterItems[0] = Qtd (number or "-")
    // afterItems[1] = %Aloc
    const qtdStr = afterItems[0]?.str || '';
    const pctStr = afterItems[1]?.str || '';
    const pctMatch = pctStr.match(/^(\d{1,3}[,.]\d{2})%$/);
    const pctAloc = pctMatch ? parseFloat(pctMatch[1].replace(',', '.')) : null;

    // Name = items to the LEFT of R$
    const nameItems = row.filter(r => r.x < rsX - 5);
    const namePart = nameItems.map(r => r.str).join(' ').trim();
    const fullName = (pendingName ? pendingName + (namePart ? ' ' + namePart : '') : namePart).trim();
    pendingName = '';

    // Category row: Qtd is "-"
    if (qtdStr === '-') {
      const cat = detectCategory(fullName);
      if (cat) currentCat = cat;
      else if (fullName.length > 1) currentCat = fullName;
      continue;
    }

    // Asset row: needs valid %Aloc and a meaningful name
    if (fullName.length > 1 && pctAloc !== null && pctAloc > 0 && pctAloc <= 100) {
      assets.push({ nome: fullName, categoria: currentCat || 'Outros', valor: monetaryValue, pct: pctAloc });
    }
  }

  return assets;
}

async function loadClientAssets(c) {
  if (c.ativos !== undefined) return c.ativos;
  if (!c.relatorios.length) { c.ativos = []; return []; }

  try {
    const file = await c.relatorios[0].handle.getFile();
    c.ativos = await extractAssetsFromPDF(await file.arrayBuffer());
    c.ativosPdfNome = c.relatorios[0].nome;

    // Update global asset index
    for (const a of c.ativos) {
      const key = normalizeAsset(a.nome);
      if (!assetGlobalIndex.has(key)) assetGlobalIndex.set(key, []);
      const existing = assetGlobalIndex.get(key);
      if (!existing.some(e => e.codigo === c.codigo)) {
        existing.push({ codigo: c.codigo, nome: c.nome, valor: a.valor, pct: a.pct, nome_ativo: a.nome });
      }
    }

    // Auto-estimate COE % from "Renda Variável Global" (proxy in XPerformance)
    // Only store if perfil doesn't already have coe_pct set
    if (!parseFloat(c.perfil.coe_pct || 0)) {
      const rvgPct = c.ativos
        .filter(a => /renda\s*vari/i.test(a.categoria))
        .reduce((s, a) => s + (a.pct || 0), 0);
      if (rvgPct > 0) c.coePctEstimado = Math.round(rvgPct * 100) / 100;
    }
  } catch(e) {
    console.warn('Erro ao ler PDF de', c.nome, e);
    c.ativos = [];
  }
  return c.ativos;
}

function renderAtivos() {
  const c = selectedClient;
  const el = document.getElementById('tab-ativos');

  if (!c.relatorios.length) {
    el.innerHTML = '<div class="empty-state">Nenhum PDF em <code>relatorios/</code>.<br><span style="font-size:11px">Coloque o XPerformance mais recente ali e recarregue.</span></div>';
    return;
  }

  el.innerHTML =
    '<div class="ativos-toolbar"><span class="ativos-status" id="ativos-status">&#x23F3; Lendo PDF...</span>' +
    '<span class="relatorio-nome">' + esc(c.relatorios[0].nome) + '</span></div>' +
    '<div id="ativos-content"></div>';

  loadClientAssets(c).then(ativos => {
    const statusEl = document.getElementById('ativos-status');
    const contentEl = document.getElementById('ativos-content');
    if (!statusEl || !contentEl) return;

    if (!ativos.length) {
      statusEl.textContent = 'Nenhum ativo identificado';
      contentEl.innerHTML = '<div class="empty-state">Não encontrei linhas de ativos no PDF.<br><span style="font-size:11px">Verifique se é o XPerformance padrão da XP.</span></div>';
      return;
    }

    statusEl.textContent = ativos.length + ' ativos encontrados';

    // Group by category
    const cats = {};
    for (const a of ativos) { if (!cats[a.categoria]) cats[a.categoria] = []; cats[a.categoria].push(a); }

    const CAT_ORDER = ['Pós Fixado','Inflação','Pré Fixado','Renda Variável Global','Fundos Listados','Alternativo','Previdência','COE','Caixa','Outros'];
    const ordered = [...CAT_ORDER.filter(k => cats[k]), ...Object.keys(cats).filter(k => !CAT_ORDER.includes(k))];

    contentEl.innerHTML = ordered.map(cat => {
      const items = cats[cat];
      const catTotal = items.reduce((s, a) => s + (a.valor || 0), 0);
      return '<div class="ativos-category">' +
        '<div class="ativos-cat-header" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display===\'none\'?\'table\':\' none\'">' +
          '<span>' + esc(cat) + ' <span style="font-size:10px;color:var(--text3)">(' + items.length + ')</span></span>' +
          '<span>' + fmMoney(catTotal, true) + '</span>' +
        '</div>' +
        '<table class="ativos-table">' +
          '<thead><tr><th>Ativo</th><th class="nr">Valor</th><th class="nr">%</th></tr></thead>' +
          '<tbody>' + items.map(a =>
            '<tr><td class="ativo-nome">' + esc(a.nome) + '</td>' +
            '<td class="nr">' + (a.valor ? fmMoney(a.valor) : '—') + '</td>' +
            '<td class="nr">' + (a.pct != null ? fmPctPlain(a.pct) + '%' : '—') + '</td></tr>'
          ).join('') + '</tbody></table></div>';
    }).join('');
  }).catch(e => {
    const statusEl = document.getElementById('ativos-status');
    if (statusEl) statusEl.textContent = 'Erro ao ler PDF';
    const contentEl = document.getElementById('ativos-content');
    if (contentEl) contentEl.innerHTML = '<div class="empty-state">Erro: ' + esc(e.message) + '</div>';
  });
}

// ============ GLOBAL ASSET SEARCH ============
function searchByAsset(q) {
  assetQuery = q.trim();
  const clearBtn = document.getElementById('asset-clear-btn');

  if (!assetQuery) { exitAssetSearch(); return; }

  if (clearBtn) clearBtn.style.display = 'inline';
  document.getElementById('client-list').style.display = 'none';
  const resultsEl = document.getElementById('asset-results');
  resultsEl.style.display = 'block';

  const nq = normalizeAsset(assetQuery);
  const byClient = new Map();

  for (const [key, entries] of assetGlobalIndex.entries()) {
    if (key.includes(nq)) {
      for (const e of entries) {
        if (!byClient.has(e.codigo)) byClient.set(e.codigo, []);
        byClient.get(e.codigo).push(e);
      }
    }
  }

  if (byClient.size === 0 && assetGlobalIndex.size < allClients.length) {
    resultsEl.innerHTML =
      '<div class="asi-header">Índice parcial (' + assetGlobalIndex.size + ' clientes carregados)</div>' +
      '<div style="padding:10px 14px"><button class="btn-save" style="font-size:11px;padding:6px 14px" onclick="loadAllAssets()">&#x23F3; Carregar todos os PDFs</button></div>';
    return;
  }

  if (byClient.size === 0) {
    resultsEl.innerHTML = '<div class="asi-header">Nenhum resultado para "' + esc(assetQuery) + '"</div>';
    return;
  }

  resultsEl.innerHTML =
    '<div class="asi-header">' + byClient.size + ' cliente(s) com "' + esc(assetQuery) + '"</div>' +
    [...byClient.entries()].map(([codigo, entries]) => {
      const c = allClients.find(cl => cl.codigo === codigo);
      return '<div class="asi-client" onclick="selectClientByCodigo(\'' + codigo + '\')">' +
        '<div class="asi-nome">' + esc(c ? c.nome : codigo) + ' <span style="color:var(--text3);font-weight:400">' + codigo + '</span></div>' +
        entries.map(e =>
          '<div class="asi-match">' + esc(e.nome_ativo) +
          (e.pct != null ? ' · <strong>' + fmPctPlain(e.pct) + '%</strong>' : '') +
          (e.valor ? ' · ' + fmMoney(e.valor, true) : '') + '</div>'
        ).join('') + '</div>';
    }).join('');
}

function exitAssetSearch() {
  assetQuery = '';
  const inp = document.getElementById('asset-query');
  const clearBtn = document.getElementById('asset-clear-btn');
  if (inp) inp.value = '';
  if (clearBtn) clearBtn.style.display = 'none';
  document.getElementById('client-list').style.display = 'block';
  document.getElementById('asset-results').style.display = 'none';
}

function selectClientByCodigo(codigo) {
  const c = allClients.find(cl => cl.codigo === codigo);
  if (c) selectClient(c);
}

async function loadAllAssets() {
  const toLoad = allClients.filter(c => c.ativos === undefined && c.relatorios.length > 0);
  toast('Carregando ' + toLoad.length + ' PDFs...', '');
  let done = 0;
  for (const c of toLoad) {
    await loadClientAssets(c);
    done++;
    if (done % 5 === 0) toast('Carregando PDFs... ' + done + '/' + toLoad.length, '');
  }
  toast('Todos os PDFs carregados!', 'ok');
  if (assetQuery) searchByAsset(assetQuery);
}

// ================================================================
// REUNIOES TAB
// ================================================================
function renderReunioes() {
  document.getElementById('tab-reunioes').innerHTML =
    '<div class="empty-state">Registro de reuniões em breve.</div>';
}

// ================================================================
// UI HELPERS
// ================================================================
function showLoading(text) { document.getElementById('loading').style.display = 'flex'; document.getElementById('loading-text').textContent = text; }
function hideLoading() { document.getElementById('loading').style.display = 'none'; }
function toast(msg, type) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show' + (type==='ok' ? ' tok' : type==='err' ? ' terr' : '');
  clearTimeout(el._t);
  el._t = setTimeout(() => { el.className = ''; }, 3200);
}

// ================================================================
// INIT
// ================================================================
(async () => {
  if (!window.showDirectoryPicker) return;
  try {
    const h = await restoreHandle();
    if (h) { rootHandle = h; await loadData(); }
  } catch(e) { console.warn('Restore:', e); }
})();
</script>
